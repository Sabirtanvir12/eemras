<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — EEMRAS</title>
  <meta name="description"
    content="Browse our complete product collection with filters by category, size, and availability.">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">EEM<span>RAS</span></a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/products" class="active">Products</a></li>
        <li><a href="/wishlist">Wishlist</a></li>
      </ul>
      <div class="nav-search">
        <input type="text" id="mainSearch" placeholder="Search products…">
        <span class="search-icon">⌕</span>
      </div>
      <div class="nav-actions">
        <a href="/wishlist" class="nav-icon-btn">♡<span class="badge wishlist-badge" style="display:none">0</span></a>
      </div>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <div style="background:var(--charcoal-mid);padding:2rem clamp(1rem,4vw,3rem)">
    <div style="max-width:1400px;margin:0 auto">
      <h1 style="color:var(--ivory);font-size:clamp(1.5rem,3vw,2.2rem)">All Products</h1>
      <p style="color:var(--gray-light);margin-top:0.3rem;font-size:0.9rem">Discover our full collection</p>
    </div>
  </div>

  <div class="section" style="padding-top:1.5rem">
    <!-- Filters Bar -->
    <div class="filters-bar">
      <select class="filter-select" id="catFilter">
        <option value="">All Categories</option>
      </select>
      <select class="filter-select" id="measureFilter">
        <option value="">All Sizes</option>
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
        <option value="XL">XL</option>
        <option value="XXL">XXL</option>
        <option value="Free Size">Free Size</option>
      </select>
      <button class="filter-pill" id="availFilter" data-val="">All</button>
      <button class="filter-pill" id="availBtn" data-val="available">Available</button>
      <button class="filter-pill" id="soldBtn" data-val="sold_out">Sold Out</button>
      <select class="filter-select" id="sortFilter">
        <option value="">Newest First</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
        <option value="name">A → Z</option>
      </select>
      <span class="results-count" id="resultsCount"></span>
    </div>

    <!-- Grid -->
    <div class="products-grid" id="productsGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <p>© 2026 EEMRAS. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    let currentPage = 1;
    let currentStatus = '';

    const grid = document.getElementById('productsGrid');
    const paginationEl = document.getElementById('pagination');

    function getFilters() {
      return {
        category: document.getElementById('catFilter').value,
        measurement: document.getElementById('measureFilter').value,
        status: currentStatus,
        sort: document.getElementById('sortFilter').value,
        page: currentPage,
      };
    }

    async function loadProducts() {
      showSkeletons(grid, 10);
      const f = getFilters();
      const params = new URLSearchParams();
      if (f.category) params.set('category', f.category);
      if (f.measurement) params.set('measurement', f.measurement);
      if (f.status) params.set('status', f.status);
      if (f.sort) params.set('sort', f.sort);
      params.set('page', f.page);
      params.set('limit', 20);

      try {
        const data = await API.get('/api/products?' + params);
        grid.innerHTML = '';
        document.getElementById('resultsCount').textContent = `${data.pagination.total} products`;
        if (!data.products.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <h3>No products found</h3>
          <p>Try adjusting your filters.</p>
        </div>`;
          paginationEl.innerHTML = '';
          return;
        }
        data.products.forEach(p => grid.appendChild(buildProductCard(p)));
        buildPagination(paginationEl, data.pagination, (p) => { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      } catch (e) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--gray)">Failed to load products.</p>';
      }
    }

    async function loadCategories() {
      try {
        const data = await API.get('/api/categories');
        const sel = document.getElementById('catFilter');
        data.categories.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.slug; opt.textContent = c.name;
          sel.appendChild(opt);
        });
        // Check URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('category')) sel.value = urlParams.get('category');
      } catch (e) { }
    }

    // Availability pills
    document.querySelectorAll('[data-val]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-val]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.val;
        currentPage = 1; loadProducts();
      });
    });
    document.getElementById('availFilter').classList.add('active');

    document.getElementById('catFilter').addEventListener('change', () => { currentPage = 1; loadProducts(); });
    document.getElementById('measureFilter').addEventListener('change', () => { currentPage = 1; loadProducts(); });
    document.getElementById('sortFilter').addEventListener('change', () => { currentPage = 1; loadProducts(); });

    document.getElementById('mainSearch').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        window.location.href = `/search?q=${encodeURIComponent(e.target.value.trim())}`;
      }
    });

    loadCategories().then(loadProducts);
  </script>
</body>

</html>
