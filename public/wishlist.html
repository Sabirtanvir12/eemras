<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — EEMRAS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">EEM<span>RAS</span></a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/wishlist" class="active">Wishlist</a></li>
      </ul>
      <div class="nav-search"><input type="text" id="mainSearch" placeholder="Search…"><span
          class="search-icon">⌕</span></div>
      <div class="nav-actions"><a href="/wishlist" class="nav-icon-btn">♡<span class="badge wishlist-badge"
            style="display:none">0</span></a></div>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>
  <div style="background:var(--charcoal-mid);padding:2rem clamp(1rem,4vw,3rem)">
    <div style="max-width:1400px;margin:0 auto">
      <h1 style="color:var(--ivory)">My Wishlist</h1>
      <p style="color:var(--gray-light);margin-top:0.3rem;font-size:0.9rem" id="wishCount"></p>
    </div>
  </div>
  <div class="section" style="padding-top:2rem">
    <div class="products-grid" id="wishGrid"></div>
  </div>
  <footer>
    <div class="footer-inner">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <p>© 2026 EEMRAS.</p>
      </div>
    </div>
  </footer>
  <script src="/js/utils.js"></script>
  <script>
    async function loadWishlist() {
      const ids = Wishlist.get();
      const grid = document.getElementById('wishGrid');
      document.getElementById('wishCount').textContent = `${ids.length} item${ids.length !== 1 ? 's' : ''}`;
      if (!ids.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">♡</div><h3>Your wishlist is empty</h3><p>Tap the heart icon on any product to save it here.</p><a href="/products" class="btn btn-primary" style="margin-top:1.5rem">Browse Products</a></div>`;
        return;
      }
      showSkeletons(grid, ids.length);
      const products = await Promise.all(ids.map(id => API.get(`/api/products/${id}`).then(d => d.product).catch(() => null)));
      grid.innerHTML = '';
      products.filter(Boolean).forEach(p => grid.appendChild(buildProductCard(p)));
      if (!grid.children.length) grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">😕</div><h3>Some products are no longer available.</h3></div>';
    }
    document.getElementById('mainSearch').addEventListener('keydown', e => { if (e.key === 'Enter' && e.target.value.trim()) window.location.href = `/search?q=${encodeURIComponent(e.target.value.trim())}`; });
    loadWishlist();
  </script>
</body>

</html>
