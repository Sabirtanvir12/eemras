<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — EEMRAS</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .gallery-main {
      cursor: zoom-in;
    }

    .gallery-main img {
      transition: opacity 0.2s ease;
    }

    .touch-hint {
      font-size: 0.75rem;
      color: var(--gray);
      text-align: center;
      margin-top: 0.4rem;
    }

    @media (min-width: 769px) {
      .touch-hint {
        display: none;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">EEM<span>RAS</span></a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/products" class="active">Products</a></li>
        <li><a href="/wishlist">Wishlist</a></li>
      </ul>
      <div class="nav-search">
        <input type="text" id="mainSearch" placeholder="Search…">
        <span class="search-icon">⌕</span>
      </div>
      <div class="nav-actions">
        <a href="/wishlist" class="nav-icon-btn">♡<span class="badge wishlist-badge" style="display:none">0</span></a>
      </div>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="product-detail" id="detailWrap">
    <!-- Loading skeleton -->
    <div class="product-detail-layout">
      <div>
        <div class="skel-img" style="border-radius:10px;aspect-ratio:3/4"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1rem;padding-top:1rem">
        <div class="skel-line" style="width:70%;height:24px"></div>
        <div class="skel-line" style="width:40%"></div>
        <div class="skel-line" style="width:30%"></div>
        <div class="skel-line" style="width:80%"></div>
        <div class="skel-line" style="width:80%"></div>
      </div>
    </div>
  </div>

  <div class="related-section" id="relatedSection" style="display:none">
    <div class="section-header">
      <div class="section-title">
        <h2>Related Products</h2>
      </div>
    </div>
    <div class="products-grid" id="relatedGrid"></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <p>© 2026 EEMRAS.</p>
      </div>
    </div>
  </footer>

  <script src="/js/utils.js"></script>
  <script>
    const productId = window.location.pathname.split('/product/')[1];
    let allImages = [];
    let currentImgIdx = 0;

    function setImage(url, idx) {
      currentImgIdx = idx;
      const mainImg = document.getElementById('mainImg');
      mainImg.style.opacity = '0';
      setTimeout(() => { mainImg.src = url || ''; mainImg.style.opacity = '1'; }, 150);
      document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
    }

    // Swipe support
    let touchStartX = 0;
    function initSwipe(el) {
      el.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 40) {
          if (dx < 0 && currentImgIdx < allImages.length - 1) setImage(allImages[currentImgIdx + 1], currentImgIdx + 1);
          else if (dx > 0 && currentImgIdx > 0) setImage(allImages[currentImgIdx - 1], currentImgIdx - 1);
        }
      }, { passive: true });
    }

    async function loadProduct() {
      try {
        const data = await API.get(`/api/products/${productId}`);
        const { product, images, related } = data;

        document.title = `${product.name} — EEMRAS`;

        // Breadcrumb
        document.getElementById('breadcrumb').innerHTML = `
        <a href="/">Home</a><span class="breadcrumb-sep">/</span>
        <a href="/products">Products</a><span class="breadcrumb-sep">/</span>
        ${product.category_name ? `<a href="/category/${product.category_slug}">${escapeHtml(product.category_name)}</a><span class="breadcrumb-sep">/</span>` : ''}
        <span>${escapeHtml(product.name)}</span>
      `;

        // Build image list with deduplication
        const imageSet = new Set();
        if (product.main_image) imageSet.add(product.main_image);
        images.forEach(i => imageSet.add(i.image_url));
        allImages = Array.from(imageSet);
        if (!allImages.length) allImages = [''];

        // Debug logging
        console.log('Main image:', product.main_image);
        console.log('Gallery images:', images);
        console.log('Final allImages array:', allImages);
        console.log('Total unique images:', allImages.length);

        const isWishlisted = Wishlist.has(product.id);
        const hasDiscount = product.discount_price && product.discount_price < product.price;

        const wrap = document.getElementById('detailWrap');
        wrap.innerHTML = `
        <div class="product-detail-layout">
          <!-- Gallery -->
          <div class="product-gallery">
            <div class="gallery-main">
              <img id="mainImg" src="${allImages[0]}" alt="${escapeHtml(product.name)}" style="width:100%;height:100%;object-fit:cover;opacity:1;transition:opacity 0.2s">
            </div>
            <p class="touch-hint">← Swipe to browse images →</p>
            ${allImages.length > 1 ? `
              <div class="gallery-thumbs" id="thumbsRow">
                ${allImages.map((url, i) => `
                  <div class="gallery-thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" data-url="${url}">
                    <img src="${url}" alt="Image ${i + 1}" loading="lazy">
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
          <!-- Info -->
          <div class="product-detail-info">
            ${product.status === 'sold_out' ? '<div style="display:inline-block;background:var(--charcoal);color:white;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:0.35rem 0.8rem;border-radius:100px;margin-bottom:0.25rem">Sold Out</div>' : ''}
            <h1 class="product-detail-name">${escapeHtml(product.name)}</h1>

            <button class="product-detail-code" id="copyCodeBtn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              ${escapeHtml(product.code)}
            </button>

            <div class="product-detail-price">${priceHTML(product.price, product.discount_price)}</div>

            <div class="product-detail-meta">
              ${product.category_name ? `<div class="meta-row"><span class="meta-label">Category</span><a href="/category/${product.category_slug}" style="color:var(--terra)">${escapeHtml(product.category_name)}</a></div>` : ''}
              ${product.measurement ? `<div class="meta-row"><span class="meta-label">Size</span><span>${escapeHtml(product.measurement)}</span></div>` : ''}
              <div class="meta-row"><span class="meta-label">Status</span><span style="color:${product.status === 'available' ? '#2e7d32' : '#c62828'}">${product.status === 'available' ? '✓ Available' : '✕ Sold Out'}</span></div>
            </div>

            ${product.description ? `<p class="product-detail-desc">${escapeHtml(product.description).replace(/\n/g, '<br>')}</p>` : ''}

            <div class="detail-actions">
              <button class="btn btn-primary" id="wishlistDetailBtn" style="min-width:160px">
                ${isWishlisted ? '❤️ Wishlisted' : '♡ Add to Wishlist'}
              </button>
              <button class="btn btn-outline wishlist-detail-btn" id="shareBtn" title="Share">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share
              </button>
            </div>
          </div>
        </div>
      `;

        // Thumbnail clicks
        document.querySelectorAll('.gallery-thumb').forEach(t => {
          t.addEventListener('click', () => setImage(t.dataset.url, parseInt(t.dataset.idx)));
        });

        // Swipe
        initSwipe(document.querySelector('.gallery-main'));

        // Copy code
        document.getElementById('copyCodeBtn').addEventListener('click', () => copyToClipboard(product.code));

        // Wishlist
        const wishBtn = document.getElementById('wishlistDetailBtn');
        wishBtn.addEventListener('click', () => {
          const added = Wishlist.toggle(product.id);
          wishBtn.textContent = added ? '❤️ Wishlisted' : '♡ Add to Wishlist';
          updateWishlistBadge();
          showToast(added ? 'Added to wishlist!' : 'Removed from wishlist');
        });

        // Share
        document.getElementById('shareBtn').addEventListener('click', () => {
          if (navigator.share) {
            navigator.share({ title: product.name, url: window.location.href });
          } else {
            copyToClipboard(window.location.href);
          }
        });

        // Related
        if (related.length) {
          const relSec = document.getElementById('relatedSection');
          const relGrid = document.getElementById('relatedGrid');
          relSec.style.display = '';
          related.forEach(p => relGrid.appendChild(buildProductCard(p)));
        }
      } catch (e) {
        document.getElementById('detailWrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">😕</div>
          <h3>Product not found</h3>
          <p>This product may have been removed.</p>
          <a href="/products" class="btn btn-primary" style="margin-top:1.5rem">Browse Products</a>
        </div>`;
      }
    }

    document.getElementById('mainSearch').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        window.location.href = `/search?q=${encodeURIComponent(e.target.value.trim())}`;
      }
    });

    loadProduct();
  </script>
</body>

</html>
